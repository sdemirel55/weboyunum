name: Build SFD Sketch APK

on:
  pull_request:
    branches: [ main ]
    paths:
      - "android-apk/**"
      - ".github/workflows/build-sfd-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle -p android-apk assembleDebug --stacktrace

      - name: Prepare APK
        run: cp android-apk/app/build/outputs/apk/debug/app-debug.apk SFD-Sketch-Android-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SFD-Sketch-Android-APK
          path: SFD-Sketch-Android-v1.0.apk
          if-no-files-found: error
          retention-days: 7
